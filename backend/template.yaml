AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Dino Party backend

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref GameTable
        CONNECTIONS_TABLE: !Ref ConnectionsTable
        WEBSOCKET_ENDPOINT: !Sub "https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
        S3_BUCKET: !Ref PhotoBucket

Resources:
  # DynamoDB Tables
  GameTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dino-party-game
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dino-party-connections
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH

  # S3 Bucket for profile pics
  PhotoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "dino-party-photos-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: AutoDelete
            Status: Enabled
            ExpirationInDays: 7
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedHeaders: ["*"]

  # REST API
  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,PUT,OPTIONS'"
        AllowHeaders: "'Content-Type'"

  # WebSocket API
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: dino-party-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: prod
      AutoDeploy: true

  # WebSocket handlers
  WsConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.ws_connect.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  WsConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsConnectFunction
      Principal: apigateway.amazonaws.com

  WsConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: "$connect"
      Target: !Sub "integrations/${WsConnectIntegration}"

  WsConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsConnectFunction.Arn}/invocations"

  WsDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.ws_disconnect.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable

  WsDisconnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsDisconnectFunction
      Principal: apigateway.amazonaws.com

  WsDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: "$disconnect"
      Target: !Sub "integrations/${WsDisconnectIntegration}"

  WsDisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDisconnectFunction.Arn}/invocations"

  WsDefaultFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.ws_default.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"

  WsDefaultPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WsDefaultFunction
      Principal: apigateway.amazonaws.com

  WsDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: "$default"
      Target: !Sub "integrations/${WsDefaultIntegration}"

  WsDefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WsDefaultFunction.Arn}/invocations"

  # REST handlers - Player
  PlayerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.player.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
        - S3CrudPolicy:
            BucketName: !Ref PhotoBucket
      Events:
        CreatePlayer:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /player
            Method: POST
        GetPlayer:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /player/{id}
            Method: GET

  # REST handlers - Scan
  ScanDinoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.scan_dino.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        ScanDino:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /scan/dino/{species}
            Method: POST

  ScanFoodFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.scan_food.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        ScanFood:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /scan/food/{type}
            Method: POST

  ScanEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.scan_event.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        ScanEvent:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /scan/event/{type}
            Method: POST

  ScanInspirationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.scan_inspiration.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        ScanInspiration:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /scan/inspiration
            Method: POST

  ScanNoteFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.scan_note.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
      Events:
        ScanNote:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /scan/note/{note_id}
            Method: POST

  # REST handlers - Lobby
  LobbyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.lobby.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        CreateLobby:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /lobby
            Method: POST
        JoinLobby:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /lobby/{code}/join
            Method: POST
        AnswerTrivia:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /lobby/{code}/answer
            Method: POST

  # REST handlers - Dino customization
  DinoFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.dino.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        CustomizeDino:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /dino/{species}/customize
            Method: PUT
        SetPartner:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /dino/{species}/partner
            Method: PUT

  # REST handlers - Boss
  BossFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.boss.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        BossTap:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /boss/tap
            Method: POST

  # REST handlers - Plaza
  PlazaFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.plaza.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
      Events:
        GetPlaza:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /plaza
            Method: GET

  # REST handlers - Admin
  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src.handlers.admin.handler
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref GameTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*"
      Events:
        BossBuildup:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /admin/boss/buildup
            Method: POST
        BossStart:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /admin/boss/start
            Method: POST
        Announce:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /admin/announce
            Method: POST
        Dashboard:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /admin/dashboard
            Method: GET

Outputs:
  RestApiUrl:
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  WebSocketUrl:
    Value: !Sub "wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  PhotoBucketName:
    Value: !Ref PhotoBucket
